<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Random Image</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; color: #666; }
  </style>
</head>
<body>
  <p>正在跳转到随机图片...</p>
  <script>
    fetch('https://opg.dpdns.org/image_list.json')
      .then(r => r.json())
      .then(list => {
        const idx = Math.floor(Math.random() * list.length);
        const url = 'https://opg.dpdns.org/images/' + encodeURIComponent(list[idx]);
        window.location.href = url;
      })
      .catch(() => {
        window.location.href = 'https://opg.dpdns.org/';
      });
  </script>
</body>
</html>
