<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机图片 API - 风栖十月</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; border-radius: 16px; padding: 48px 40px; box-shadow: 0 8px 32px rgba(0,0,0,.08); text-align: center; max-width: 440px; width: 90%; }
.logo { font-size: 48px; margin-bottom: 16px; }
h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
.tagline { font-size: 13px; color: #888; margin-bottom: 32px; }
.section { margin-bottom: 24px; text-align: left; }
.section-title { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.api-url { background: #f6f8fa; border-radius: 8px; padding: 14px 16px; font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; color: #0052cc; word-break: break-all; border: 1px solid #e8ecf0; }
.btn-group { display: flex; gap: 12px; margin-top: 8px; }
.btn { flex: 1; padding: 12px 0; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; text-align: center; transition: all .15s; cursor: pointer; border: none; }
.btn-primary { background: #0052cc; color: #fff; }
.btn-primary:hover { background: #003d99; }
.btn-secondary { background: #f0f2f5; color: #333; border: 1px solid #ddd; }
.btn-secondary:hover { background: #e4e6ea; }
.footer { margin-top: 32px; font-size: 11px; color: #bbb; }
.footer a { color: #999; text-decoration: none; }
.footer a:hover { color: #0052cc; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🖼️</div>
  <h1>随机图片 API</h1>
  <p class="tagline">每次请求返回一张随机图片（302 重定向）</p>
  <div class="section">
    <div class="section-title">API 地址</div>
    <div class="api-url" id="apiUrl"></div>
  </div>
  <div class="btn-group">
    <a href="" class="btn btn-primary" id="tryBtn">随机图片 →</a>
    <a href="javascript:void(0)" class="btn btn-secondary" id="copyBtn">复制 API</a>
  </div>
  <div class="footer">
    © 2026 风栖十月
    | <a href="https://beian.miit.gov.cn" target="_blank">苏ICP备2026025316号</a>
    | <a href="https://www.beian.gov.cn" target="_blank">苏公网安备32098102321404号</a>
  </div>
</div>
<script>
const apiBase = 'https://a.600060.xyz';
document.getElementById('apiUrl').textContent = apiBase + '/';
document.getElementById('tryBtn').href = apiBase + '/';
document.getElementById('copyBtn').addEventListener('click', function(e) {
  e.preventDefault();
  const url = apiBase + '/';
  navigator.clipboard.writeText(url).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = '已复制！';
    setTimeout(function() { btn.textContent = '复制 API'; }, 1500);
  });
});
</script>
</body>
</html>
